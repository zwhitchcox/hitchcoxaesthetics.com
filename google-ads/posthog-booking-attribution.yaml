  - name: Booking CTA Performance
    description:
      CTA likelihood and click trends for booking and phone calls across landing
      page types.
    tags:
      - booking
      - attribution
      - cta
    managed_tag: managed:booking-cta-performance
    sync_mode: replace_managed
    insights:
      - kind: funnel
        name: Book CTA Click Funnel - Initial Landing Prefix Type
        description:
          Likelihood to click Book Online broken down by
          initial_landing_page_prefix_type.
        breakdown: initial_landing_page_prefix_type
        steps:
          - event: marketing_page_viewed
            custom_name: Marketing Page Viewed
          - event: book_cta_clicked
            custom_name: Book CTA Clicked

      - kind: funnel
        name: Phone CTA Click Funnel - Initial Landing Prefix Type
        description:
          Likelihood to click the phone CTA broken down by
          initial_landing_page_prefix_type.
        breakdown: initial_landing_page_prefix_type
