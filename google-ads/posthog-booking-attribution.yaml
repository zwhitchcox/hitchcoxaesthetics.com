# YAML anchors keep repeated booking step definitions concise.

posthog:
  project_id: 72891

project_sync:
  prune_unconfigured_dashboards: true
  prune_unconfigured_insights: true

defaults:
  date_range:
    date_from: -30d
  breakdown_limit: 25
  insight_tags:
    - booking
    - attribution

dashboards:
  - name: Booking Overview - Source & Revenue
    description:
      Source-level booking conversion and revenue reporting for the custom
      Boulevard flow.
    tags:
      - booking
      - attribution
      - revenue
    managed_tag: managed:booking-overview-source-revenue
    sync_mode: replace_managed
    insights:
      - kind: funnel
        name: Entry To Completion - Source Detail
        description: 2-step booking funnel broken down by traffic_source_detail.
        breakdown: traffic_source_detail
        steps: &entry_to_completion_steps
          - event: booking_funnel_entered
            custom_name: Booking Funnel Entered
          - event: booking_completed
            custom_name: Booking Completed

      - kind: funnel
        name: Entry To Completion - Channel
        description: 2-step booking funnel broken down by traffic_channel.
        breakdown: traffic_channel
        steps: *entry_to_completion_steps

      - kind: funnel
        name: Entry To Completion - Platform
        description: 2-step booking funnel broken down by traffic_platform.
        breakdown: traffic_platform
        steps: *entry_to_completion_steps

      - kind: funnel
        name: Entry To Completion - Client Type
        description: 2-step booking funnel broken down by booking_client_type.
        breakdown: booking_client_type
        steps: *entry_to_completion_steps

      - kind: funnel
        name: Entry To Completion - LP Entry by Source Detail
        description:
          Entry-to-completion funnel for users who entered booking from an /lp
          page, broken down by traffic_source_detail.
        breakdown: traffic_source_detail
        properties:
          - key: book_entry_page_prefix_type
            type: event
            value:
              - lp
            operator: exact
        steps: *entry_to_completion_steps

      - kind: funnel
        name: Entry To Completion - Non-LP Entry by Source Detail
        description:
          Entry-to-completion funnel for users who entered booking from a
          non-/lp page, broken down by traffic_source_detail.
        breakdown: traffic_source_detail
        properties:
          - key: book_entry_page_prefix_type
            type: event
            value:
              - non_lp
            operator: exact
        steps: *entry_to_completion_steps

      - kind: trend
        name: Booking Entry Trends - Source Detail
        description: Booking funnel entries by traffic_source_detail.
        breakdown: traffic_source_detail
        series:
          - event: booking_funnel_entered
            custom_name: Booking Entry Trends - Source Detail

      - kind: trend
        name: Booking Entry Trends - Channel
        description: Booking funnel entries by traffic_channel.
        breakdown: traffic_channel
        series:
          - event: booking_funnel_entered
            custom_name: Booking Entry Trends - Channel

      - kind: trend
        name: Booking Completion Trends - Source Detail
        description: Booking completions by traffic_source_detail.
        breakdown: traffic_source_detail
        series:
          - event: booking_completed
            custom_name: Booking Completion Trends - Source Detail

      - kind: trend
        name: Booking Completion Trends - Channel
        description: Booking completions by traffic_channel.
        breakdown: traffic_channel
        series:
          - event: booking_completed
            custom_name: Booking Completion Trends - Channel

      - kind: trend
        name: Booking Completion Trends - Client Type
        description: Booking completions by booking_client_type.
        breakdown: booking_client_type
        series:
          - event: booking_completed
            custom_name: Booking Completion Trends - Client Type

      - kind: trend
        name: Booking Completion Trends - Telehealth
        description: Booking completions by booking_is_telehealth.
        breakdown: booking_is_telehealth
        series:
          - event: booking_completed
            custom_name: Booking Completion Trends - Telehealth

      - kind: trend
        name: Revenue Proxy Trend - Source Detail
        description: Estimated booking value summed by traffic_source_detail.
        breakdown: traffic_source_detail
        series:
          - event: booking_completed
            custom_name: Revenue Proxy Trend - Source Detail
            math: sum
            math_property: booking_value_usd
            math_property_type: event

      - kind: trend
        name: Revenue Proxy Trend - Client Type
        description: Estimated booking value summed by booking_client_type.
        breakdown: booking_client_type
        series:
          - event: booking_completed
            custom_name: Revenue Proxy Trend - Client Type
            math: sum
            math_property: booking_value_usd
            math_property_type: event

      - kind: trend
        name: Attributed Revenue Trend - Source Detail
        description:
          Attributed Boulevard revenue summed by traffic_source_detail.
        breakdown: traffic_source_detail
        series:
          - event: blvd_revenue_recorded
            custom_name: Attributed Revenue Trend - Source Detail
            math: sum
            math_property: gross_amount_usd
            math_property_type: event

      - kind: trend
        name: Attributed Revenue Trend - Client Type
        description: Attributed Boulevard revenue summed by booking_client_type.
        breakdown: booking_client_type
        series:
          - event: blvd_revenue_recorded
            custom_name: Attributed Revenue Trend - Client Type
            math: sum
            math_property: gross_amount_usd
            math_property_type: event

      - kind: trend
        name: Attributed Revenue Trend - Telehealth
        description:
          Attributed Boulevard revenue summed by booking_is_telehealth.
        breakdown: booking_is_telehealth
        series:
          - event: blvd_revenue_recorded
            custom_name: Attributed Revenue Trend - Telehealth
            math: sum
            math_property: gross_amount_usd
            math_property_type: event

  - name: Booking Pages - Conversion
