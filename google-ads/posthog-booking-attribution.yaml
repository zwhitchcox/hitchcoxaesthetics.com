        description: 2-step booking funnel broken down by book_entry_from_path.
        breakdown: book_entry_from_path
        steps: *entry_to_completion_steps

      - kind: funnel
        name: Entry To Completion - Landing Path
        description: 2-step booking funnel broken down by initial_landing_path.
        breakdown: initial_landing_path
        steps: *entry_to_completion_steps

      - kind: funnel
        name: Entry To Completion - Entry Page Prefix Type
        description:
          2-step booking funnel broken down by book_entry_page_prefix_type.
        breakdown: book_entry_page_prefix_type
        steps: *entry_to_completion_steps

      - kind: funnel
        name: Entry To Completion - Entry Page Type
        description: 2-step booking funnel broken down by book_entry_page_type.
        breakdown: book_entry_page_type
        steps: *entry_to_completion_steps

      - kind: funnel
        name: Entry To Completion - Landing Path - New Clients
        description:
          Landing-page conversion rate for bookings on the default unverified
          path.
        breakdown: initial_landing_path
        properties:
          - key: booking_client_type
            type: event
            value:
              - new_client
            operator: exact
        steps: *entry_to_completion_steps

      - kind: funnel
        name: Entry To Completion - Landing Path - Returning Clients
        description:
          Landing-page conversion rate for bookings with Boulevard ownership
          verification.
        breakdown: initial_landing_path
        properties:
          - key: booking_client_type
            type: event
            value:
              - returning_client
            operator: exact
        steps: *entry_to_completion_steps

      - kind: funnel
        name: Entry To Completion - Entry Path - New Clients
        description:
          Last-page-before-book conversion rate for bookings on the default
          unverified path.
        breakdown: book_entry_from_path
        properties:
          - key: booking_client_type
            type: event
            value:
              - new_client
            operator: exact
        steps: *entry_to_completion_steps

      - kind: funnel
        name: Entry To Completion - Entry Path - Returning Clients
        description:
          Last-page-before-book conversion rate for bookings with Boulevard
          ownership verification.
        breakdown: book_entry_from_path
        properties:
          - key: booking_client_type
            type: event
            value:
              - returning_client
            operator: exact
        steps: *entry_to_completion_steps

      - kind: trend
        name: Booking Entry Trends - Landing Path
        description: Booking funnel entries by initial_landing_path.
        breakdown: initial_landing_path
        series:
          - event: booking_funnel_entered
            custom_name: Booking Entry Trends - Landing Path

      - kind: funnel
        name: Pre-Book Quality Funnel - Pages Before Book
        description:
          2-step booking funnel broken down by pages_before_book_bucket.
        breakdown: pages_before_book_bucket
        steps: *entry_to_completion_steps

      - kind: funnel
        name: Pre-Book Quality Funnel - Pre-Book Duration
        description:
          2-step booking funnel broken down by pre_book_duration_bucket.
        breakdown: pre_book_duration_bucket
        steps: *entry_to_completion_steps

  - name: Booking Funnel - Diagnostics
    description:
      Step-by-step booking funnel diagnostics by service, friction points, and
      client type.
    tags:
      - booking
      - attribution
      - funnel
    managed_tag: managed:booking-funnel-diagnostics
    sync_mode: replace_managed
    insights:
      - kind: funnel
        name: Entry To Completion - Service Category
        description:
          2-step booking funnel broken down by booking_service_category.
        breakdown: booking_service_category
        steps: *entry_to_completion_steps

      - kind: funnel
        name: Full Booking Step Funnel - Source Detail
        description: Full booking funnel broken down by traffic_source_detail.
        breakdown: traffic_source_detail
        steps: &full_booking_steps
          - event: booking_funnel_entered
            custom_name: Booking Funnel Entered
          - event: booking_step_viewed
            custom_name: Booking - Services
            properties:
              - key: step
                type: event
                value:
                  - service
                operator: exact
          - event: booking_step_viewed
            custom_name: Booking - Locations
            properties:
              - key: step
                type: event
                value:
                  - location
                operator: exact
          - event: booking_step_viewed
            custom_name: Booking - Schedule
            properties:
              - key: step
                type: event
                value:
                  - schedule
                operator: exact
          - event: booking_step_viewed
            custom_name: Booking Details
            properties:
              - key: step
                type: event
                value:
                  - details
                operator: exact
          - event: booking_step_viewed
            custom_name: Booking - Credit Card/Reserve
            properties:
              - key: step
                type: event
                value:
                  - reserve
                operator: exact
          - event: booking_completed
            custom_name: Booking Completed

      - kind: funnel
        name: Full Booking Step Funnel - Service Name
        description: Full booking funnel broken down by booking_service_name.
        breakdown: booking_service_name
        steps: *full_booking_steps

      - kind: funnel
        name: Full Booking Step Funnel - Service Category
        description:
          Full booking funnel broken down by booking_service_category.
        breakdown: booking_service_category
        steps: *full_booking_steps

      - kind: funnel
        name: Full Booking Step Funnel - Telehealth
        description: Full booking funnel broken down by booking_is_telehealth.
        breakdown: booking_is_telehealth
        steps: *full_booking_steps

      - kind: funnel
        name: Full Booking Step Funnel - Requires Card
        description: Full booking funnel broken down by booking_requires_card.
        breakdown: booking_requires_card
        steps: *full_booking_steps

      - kind: funnel
        name: Full Booking Step Funnel - Verified Client
        description:
          Full booking funnel broken down by booking_has_verified_client.
        breakdown: booking_has_verified_client
        steps: *full_booking_steps

      - kind: funnel
        name: Full Booking Step Funnel - Client Type
        description: Full booking funnel broken down by booking_client_type.
        breakdown: booking_client_type
        steps: *full_booking_steps

