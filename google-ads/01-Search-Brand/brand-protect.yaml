name: 'Brand Protection'
final_url: 'https://hitchcoxaesthetics.com/'

# WHY THIS MATTERS:
# Competitors can and will bid on "Sarah Hitchcox Aesthetics" to steal your high-intent traffic.
# Brand clicks are incredibly cheap (often $0.50-$1.00 compared to $5.00+ for non-brand).
# Owning the top spot ensures people looking specifically for you find YOU, not a competitor.

keywords:
  - '[sarah hitchcox aesthetics]'
  - '"sarah hitchcox"'
  - '"sarah hitchcox med spa"'
  - '"hitchcox aesthetics"'
  - '"hitchcox medspa knoxville"'

headlines: # Max 30 chars
  - 'Sarah Hitchcox Aesthetics'
  - 'Premier Knoxville MedSpa'
  - 'Expert Aesthetic Care'
  - 'Sarah Hitchcox RN'
  - 'Book Your Free Consult'
  - 'Your Local MedSpa Expert'
  - "Knoxville's Top MedSpa"
  - 'Natural Looking Results'

descriptions: # Max 90 chars
  - "Welcome to Sarah Hitchcox Aesthetics. Knoxville's premier destination for
    expert care."
  - 'Specializing in Botox, Dermal Fillers, Microneedling, and Medical Weight
    Loss.'
  - 'Book your free consultation today. Achieve natural, refreshed results with
    expert care.'
  - 'Led by Sarah Hitchcox, RN. We offer safe, minimally invasive treatments in
    Knoxville.'
